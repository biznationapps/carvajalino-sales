name: Weekly Event Monitor
on:
  schedule:
    - cron: '0 13 * * 1'  # Every Monday 8am EST (13:00 UTC)
  workflow_dispatch:       # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4 anthropic
        
      - name: Run weekly monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python weekly_monitor.py
        
      - name: Commit and push if updated
        run: |
          git config --global user.email "monitor@carvajalinos.com"
          git config --global user.name "Carvajalino Monitor"
          git add index.html monitor_log.json
          git diff --staged --quiet || git commit -m "Weekly update: new speaking opportunities $(date '+%Y-%m-%d')"
          git push
